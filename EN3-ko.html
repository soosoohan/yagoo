    * {
      margin: 0;

    }
    html, body {
      touch-action: manipulation;
      user-select: none;
    }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e5e7eb; display: flex; justify-content: center; padding: 20px; font-size:20px;}
    .app { max-width: 600px; width: 100%; background: #111827; padding: 20px; border-radius: 10px; }
    h1 { margin-top: 0; font-size:30px;}
    select, input, button { padding: 8px; margin: 4px; border-radius: 5px; border: none;  font-size:20px;}
    button { cursor: pointer; font-size:20px;}
    .card { background: #1f2937; padding: 10px; border-radius: 8px; margin-bottom: 10px;font-size:20px; }
    .log { max-height: 300px; overflow-y: auto; }
    .try { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #374151; }
    .status.ok { color: #34d399; }
    .status.warn { color: #f59e0b; }
    .status.err { color: #f87171; }
    label {font-size:20px;}

    /* === Length Buttons === */
    .length-buttons { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .length-btn {
      padding: 8px 14px;
      border-radius: 8px;
      background: #374151;
      color: #e5e7eb;
      border: 2px solid transparent;
      font-size: 20px;
      cursor: pointer;
    }
    .length-btn.active {
      background: #3b82f6;
      color: #fff;
      border-color: #93c5fd;
    }

    /* === Alphabet Keyboard === */
    .kb { margin-top:10px; display:grid; grid-template-columns: repeat(auto-fit, minmax(40px,1fr)); gap:8px; }
    .key {
      padding:10px 8px; border-radius:8px; text-align:center; font-weight:700;
      background:#1a2430; color:#d0ddea; border:1px solid #374151; user-select:none;
      cursor: pointer;
    }
    .key.idle { background:#1a2430; color:#d0ddea; }
    .key.hit  { background:#8fd3ff; color:#062033; border-color:transparent; }
    .key.out  { background:#fccad6; color:#3a0010; border-color:transparent; }
    .kb-actions { display:flex; gap:8px; margin-top:8px; }
    .kb-actions button { flex:1; padding:10px; border-radius:8px; font-size:18px; font-weight:700; }
    .key-back { background:#374151; color:#e5e7eb; }
    .key-submit { background:#3b82f6; color:#fff; }
    .legend { display:flex; gap:8px; align-items:center; flex-wrap:wrap; font-size:16px; color:#94a3b8; }
    .legend .swatch { display:inline-block; width:14px; height:14px; border-radius:4px; margin-right:6px; vertical-align:-2px; }

<body>
<div class="app">
<button class="back-button" onclick="location.href='index.html'"> ← </button>
  <h1>영어 야구<span style="color:#94a3b8"></span></h1>
  <div class="card">
 
    
    
    <strong>게임 규칙</strong>
  <ol style="font-size:18px; padding-left:20px;">
    <li>비밀 영어 단어를 맞히세요.</li>
    <li>단어 길이(3/4/5/6)와 중복 허용 여부를 선택합니다.</li>
    <li>S=자리·글자 모두 맞음, B=글자만 맞음, O=없음.</li>
    <li>기록에는 <b>개수로</b> 표시합니다. (예: <code>1S2B1O</code>)</li>
    <li>아래 알파벳 키보드로 직접 입력하세요.</li>
    <li>정답을 맞추거나 시도 회수를 다 사용하면 게임이 끝납니다.</li>
    </ol>
  </div>

  <div class="card">
    <div class="length-buttons">
      <button class="length-btn" data-length="3">3</button>
      <button class="length-btn active" data-length="4">4</button>
      <button class="length-btn" data-length="5">5</button>
      <button class="length-btn" data-length="6">6</button>
      <label style="margin-left:8px;"><input type="checkbox" id="allowRepeats" />중복 허용</label>
      <button id="newGame">▶ 새 게임</button>
    </div>
  </div>

<div class="card">
  <label for="guess">Enter Guess</label>
  <input id="guess" type="text" placeholder="Enter a word" />
  <button id="submit">Submit</button>
  <div id="status" class="status"></div>
</div>

<div class="card">
  <div style="display:flex; justify-content:space-between;">
    <strong>History</strong>
    <button id="reveal">Show Answer</button>
  </div>
  <div class="log" id="log"></div>
</div>

<div class="card">
  <div class="legend" style="margin:8px 0 6px;">
    <span><span class="swatch" style="background:#1a2430;border:1px solid #374151;"></span>Not tried</span>
    <span><span class="swatch" style="background:#8fd3ff;"></span>Present (Hit)</span>
    <span><span class="swatch" style="background:#fccad6;"></span>Absent (Out)</span>
  </div>
  <div id="kb" class="kb" aria-label="Alphabet Keyboard (Status Indicator)"></div>
  <div class="kb-actions">
    <button class="key-back" id="kbBack">⌫ Back</button>
    <button class="key-submit" id="kbSubmit">Submit ▶</button>
  </div>
</div>

<button onclick="window.open('hints.html', '_blank')">View Word Pool</button>

</div>

<script>
const WORDPOOL = [
"ACT", "ADD", "AGE", "AMID", "AREA", "ARMS", "AGREE", "AHEAD", "ALARM", "ABSURD", "ACCENT", "ACCEPT", "YELLOW"];

function normalizeWords(arr){
  return (arr||[]).map(w=>String(w).toUpperCase().replace(/[^A-Z]/g,'')).filter(Boolean);
}
function uniq(arr){ return Array.from(new Set(arr)); }
function buildDict(len){ return uniq(normalizeWords(WORDPOOL)).filter(w=>w.length===len); }
function isIsogram(word){ return new Set(word.split("")).size === word.length; }

// ===== 길이 버튼 =====
const lengthBtns = document.querySelectorAll('.length-btn');
let length = 4;

lengthBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    lengthBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    length = parseInt(btn.dataset.length, 10);
    setStatus('Choose word length and repeat option, then press [New Game]', 'warn');
  });
});

const allowRepeats = document.getElementById('allowRepeats');
const newGameBtn = document.getElementById('newGame');
const submitBtn = document.getElementById('submit');
const revealBtn = document.getElementById('reveal');
const guessInput = document.getElementById('guess');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');

// === Alphabet Keyboard ===
const kbEl = document.getElementById('kb');
const ALPHABETS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const keyStates = new Map();

function renderAlphabetKeyboard(){
  if(!kbEl) return;
  kbEl.innerHTML = "";
  ALPHABETS.forEach(ch=>{
    const div = document.createElement("div");
    div.className = "key " + (keyStates.get(ch) || "idle");
    div.textContent = ch;
    div.addEventListener('click', () => {
      if (gameOver) return;
      if (guessInput.value.length < length) {
        guessInput.value += ch;
      }
    });
    kbEl.appendChild(div);
  });
}

function updateKeyStateFromGuess(g){
  const secretSet = new Set(secret.toUpperCase().split(""));
  const used = new Set(g.toUpperCase().split(""));
  used.forEach(ch=>{
    if(!/[A-Z]/.test(ch)) return;
    const prev = keyStates.get(ch) || "idle";
    const now = secretSet.has(ch) ? "hit" : "out";
    keyStates.set(ch, prev === "hit" ? "hit" : now);
  });
  renderAlphabetKeyboard();
}

let secret = "";
let tries = 0;
let maxTries = 0;
let dict = [];
let gameOver = true;
let usedGuesses = new Set();

function setMaxTries(len){ return len===3?9:len===4?11:len===5?13:15; }
function pickSecret(){
  const pool = allowRepeats.checked ? dict : dict.filter(isIsogram);
  return pool[Math.floor(Math.random()*pool.length)];
}
function setStatus(msg, cls=''){
  statusEl.textContent = msg;
  statusEl.className = `status ${cls}`;
}
function toggleInput(active){
  guessInput.disabled = !active;
  submitBtn.disabled = !active;
}

function countSB(secret, guess){
  let S = 0;
  for (let i=0; i<length; i++) if (secret[i] === guess[i]) S++;
  const sCount = {}, gCount = {};
  for (const ch of secret) sCount[ch] = (sCount[ch]||0) + 1;
  for (const ch of guess)  gCount[ch] = (gCount[ch]||0) + 1;
  let overlap = 0;
  for (const ch in sCount) overlap += Math.min(sCount[ch], gCount[ch]||0);
  const B = overlap - S;
  const O = length - overlap;
  return { S, B, O };
}

function appendLog(word, score){
  const div = document.createElement('div');
  div.className = 'try';
  div.innerHTML = `<span>${word}</span><span>${score.S}S ${score.B}B ${score.O}OUT</span>`;
  logEl.prepend(div);
}

function startGame(){
  dict = buildDict(length);
  if (dict.length === 0){
    setStatus('No words of that length in the word pool.','err');
    toggleInput(false);
    return;
  }
  maxTries = setMaxTries(length);
  tries = 0;
  secret = pickSecret();
  usedGuesses.clear();
  logEl.innerHTML = '';
  guessInput.value = '';
  gameOver = false;
  toggleInput(true);
  setStatus('Type your guess to begin.','ok');
  keyStates.clear();
  ALPHABETS.forEach(ch=>keyStates.set(ch,'idle'));
  renderAlphabetKeyboard();
}

function onSubmit(){
  if(gameOver) return;
  const g = guessInput.value.toUpperCase().replace(/[^A-Z]/g,'').slice(0,length);
  if(g.length !== length){ setStatus(`Please enter ${length} letters.`,'warn'); return; }
  if(!dict.includes(g)){ setStatus('That word is not in the word pool.','err'); return; }
  if(usedGuesses.has(g)){ setStatus('You already tried this word.','warn'); return; }
  usedGuesses.add(g);
  tries++;
  const score = countSB(secret, g);
  appendLog(g, score);
  updateKeyStateFromGuess(g);
  if(score.S === length){
    setStatus(`Correct! ${secret}`,'ok');
    gameOver = true;
    toggleInput(false);
    return;
  }
  if(tries >= maxTries){
    setStatus(`Out of tries! The answer was ${secret}`,'err');
    gameOver = true;
    toggleInput(false);
    return;
  }
  setStatus('Keep going.');
  guessInput.value = '';
}

document.getElementById('kbBack').addEventListener('click', () => {
  guessInput.value = guessInput.value.slice(0, -1);
});
document.getElementById('kbSubmit').addEventListener('click', onSubmit);
newGameBtn.addEventListener('click', startGame);
submitBtn.addEventListener('click', onSubmit);
revealBtn.addEventListener('click', ()=>{
  if(secret){
    setStatus(`The answer was ${secret}`,'ok');
    gameOver = true;
    toggleInput(false);
  }
});
guessInput.addEventListener('keydown', e=>{ if(e.key==='Enter') onSubmit(); });
allowRepeats.addEventListener('change', ()=>setStatus('Choose word length and repeat option, then press [New Game]','warn'));

toggleInput(false);
setStatus('Choose word length and repeat option, then press [New Game]','warn');
</script>

</body>
</html>
